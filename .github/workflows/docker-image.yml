name: Create and publish Docker image

on:
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine version (e.g. 3.23)'
        required: false
        default: ''
      app_version:
        description: 'Application version (e.g. 1.25.1 for pgbouncer)'
        required: true
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: lowercase
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT

      - name: Determine versions
        id: version
        run: |
          ALPINE_VER=${{ inputs.alpine_version || '3.23' }}
          APP_VER=${{ inputs.app_version }}
          echo "alpine_version=${ALPINE_VER}" >> $GITHUB_OUTPUT
          echo "app_version=${APP_VER}" >> $GITHUB_OUTPUT
          echo "Building pgbouncer ${APP_VER} on Alpine ${ALPINE_VER}"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.owner_lc }}/secure_and_minimal
          tags: |
            type=raw,value=pgbouncer-${{ steps.version.outputs.app_version }}
            type=raw,value=pgbouncer-latest,enable=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:v0.30.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SaM_REPO=${{ env.REGISTRY }}/${{ steps.lowercase.outputs.owner_lc }}/secure_and_minimal
            ALPINE_VERSION=${{ steps.version.outputs.alpine_version }}
            APP_VERSION=${{ steps.version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
